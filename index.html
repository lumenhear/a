/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  /* Palette — Arctic Medical */
  --ink:        #0A1628;   /* near-black navy */
  --ink-2:      #1E3A5F;   /* deep blue */
  --sky:        #0EA5E9;   /* sky blue accent */
  --sky-lt:     #38BDF8;
  --aqua:       #06B6D4;   /* cyan */
  --sage:       #10B981;   /* success green */
  --bg:         #F0F4F8;   /* cool off-white */
  --bg-card:    #FFFFFF;
  --bg-dark:    #071120;
  --slate:      #64748B;
  --slate-lt:   #94A3B8;
  --border:     #E2E8F0;
  --border-dark:#1E3A5F;

  /* Type */
  --display: 'Syne', sans-serif;
  --body:    'Plus Jakarta Sans', sans-serif;

  /* Shadows */
  --s1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --s2: 0 4px 16px rgba(0,0,0,.07), 0 2px 6px rgba(0,0,0,.05);
  --s3: 0 10px 40px rgba(0,0,0,.10), 0 4px 12px rgba(0,0,0,.06);
  --s-sky: 0 8px 28px rgba(14,165,233,.30);

  /* Motion */
  --ease: cubic-bezier(.22,.68,0,1.2);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --t: .4s;
}

/* ═══ RESET ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--body);
  background: var(--bg);

}
img { display: block; max-width: 100%; height: auto; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 4px; }

/* Hamburger */
.ham { display: none; flex-direction: column; gap: 5px; padding: 5px; }
